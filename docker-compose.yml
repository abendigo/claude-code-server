services:
  claude-code:
    image: ghcr.io/abendigo/claude-code-server:latest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - workspace:/workspace
      - ssh-key:/home/claude/.ssh:ro
    ports:
      - "2222:22"
      - "7681:7681"
    networks:
      - traefik_default

volumes:
  workspace:
  ssh-key:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/marko/claude-code/ssh

networks:
  traefik_default:
    external: true