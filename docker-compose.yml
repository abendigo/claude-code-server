services:
  claude-code:
    image: ghcr.io/abendigo/claude-code-server:latest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - workspace:/workspace
      - ssh-dir:/home/claude/.ssh
      - /home/marko/claude-code/ssh/authorized_keys:/tmp/authorized_keys:ro
    ports:
      - "2222:22"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.claude-ttyd.rule=Host(`claude.frustrated.blog`)"
      - "traefik.http.routers.claude-ttyd.entrypoints=websecure"
      - "traefik.http.routers.claude-ttyd.tls.certresolver=leresolver"
      - "traefik.http.routers.claude-ttyd.middlewares=authelia@docker"
      - "traefik.http.services.claude-ttyd.loadbalancer.server.port=7681"
    networks:
      - traefik_default

volumes:
  workspace:
  ssh-dir:

networks:
  traefik_default:
    external: true